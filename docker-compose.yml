version: '3.8'

services:
  memory-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=memory-mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=memory
      - QDRANT_HOST=memory-qdrant
      - QDRANT_PORT=6333
    depends_on:
      - memory-mysql
      - memory-qdrant
    networks:
      - memory-network

  memory-mysql:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=memory
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - memory-network

  memory-qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - memory-network

networks:
  memory-network:
    driver: bridge

volumes:
  mysql_data:
  qdrant_data:
