version: '3.8'

services:
  # O-Mind API 服务
  o-mind-api:
    image: o-mind:latest
    container_name: o-mind-api
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=memory-mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=memory
      - QDRANT_HOST=memory-qdrant
      - QDRANT_PORT=6333
      - MINIMAX_API_KEY=sk-cp-Nayg5O2Mj9qZERHjY4F7SJdxGy9sOgllv7GXtIxYc2vzcvqFpZ2CJt8zOmJ8AeP9JpexJnhf1DPUWvFV0fjNd92f-rjDThQUGXlIxIBtQxPBvYALIkrfFAM
      - SIMILARITY_THRESHOLD=0.6
      # 多实例 API Keys (JSON 格式)
      - MEMORY_API_KEYS={"key-prod-1":{"instance_id":"prod-1","name":"生产环境1"},"key-test-1":{"instance_id":"test-1","name":"测试环境1"},"key-dev-local":{"instance_id":"dev-local","name":"本地开发"}}
    depends_on:
      - memory-mysql
      - memory-qdrant
    networks:
      - o-mind-network
    restart: unless-stopped

  # MySQL 数据库
  memory-mysql:
    image: mysql:8
    container_name: memory-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=memory
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - o-mind-network
    restart: unless-stopped

  # Qdrant 向量数据库
  memory-qdrant:
    image: qdrant/qdrant:latest
    container_name: memory-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - o-mind-network
    restart: unless-stopped

networks:
  o-mind-network:
    driver: bridge

volumes:
  mysql_data:
  qdrant_data:
